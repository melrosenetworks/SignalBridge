# Test config for IP whitelist, credentials, and API key
endpoints:
  # Endpoint with credentials (Basic auth)
  a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d:
    destination: signalvault
    credentials:
      username: "testuser"
      password: "testpass"

  # Endpoint with API key
  c3d4e5f6-a7b8-6c7d-0e1f-2a3b4c5d6e7f:
    destination: signalvault
    api_key: "test-api-key-12345"

  # Endpoint with IP whitelist (127.0.0.1 allowed)
  b2c3d4e5-f6a7-5b6c-9d0e-1f2a3b4c5d6e:
    destination: signalvault
    ip_allow: ["127.0.0.1", "::1"]
